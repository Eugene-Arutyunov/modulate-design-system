---
pageTitle: Language
permalink: /playground/language/
noOutputTab: true
---

{% extends 'prototypes/playground-layout.html' %}

{% block options %}{% endblock %}

{% block upload_actions %}
      <div class="pg-upload-actions">
        <button class="m__button-outline">Choose file…</button>
      </div>
{% endblock %}

{% block above_output %}
  <style>
    .lang-card {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--m__space-m);
      height: 4rem;
      padding-inline: var(--m__space-m);
      margin-bottom: var(--m__space-l);
      background: var(--m__ui-success-color);
      color: white;
      white-space: nowrap;
    }
    .lang-name {
      font-size: var(--m__font-size-l);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .lang-stat { font-weight: 700; }
    .lang-caption { opacity: 0.75; font-size: var(--m__font-size-s); }
  </style>

  <div class="lang-card m__rounded">
    <span class="lang-name">English</span>
    <span class="lang-stat">99.6% confidence</span>
    <span class="lang-caption">First 30s analyzed</span>
  </div>
{% endblock %}
