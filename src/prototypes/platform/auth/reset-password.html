---
pageTitle: Reset password
permalink: /auth/reset-password/
---

{% extends 'prototypes/auth-layout.html' %} {% block content %}

<form class="auth-form" action="#" method="post" novalidate>
  <h1>Reset password</h1>
  <div class="m__space XS"></div>

  <!-- Link sent -->
  <div class="m__alert-success">Link sent to your email.</div>
  <div class="m__space XS"></div>
  <!-- End link sent-->

  <div class="m__textfield">
    <label for="reset-email">Email</label>
    <input
      type="email"
      id="reset-email"
      name="email"
      autocomplete="email"
      aria-describedby="auth-tf-email-invalid-error"
    />
    <div class="m__textfield__message" id="auth-tf-email-invalid-error">
      <span>Enter a valid email address</span>
    </div>
  </div>

  <div class="auth-form__actions">
    <a href="/auth/reset-password-complete/" class="m__button"
      >Send reset link</a
    >
  </div>

  <div class="m__space XS"></div>

  <div class="auth-form__links">
    <a href="/auth/login/">Back to sign in</a>
  </div>
</form>

{% endblock %}
