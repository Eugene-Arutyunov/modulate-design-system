{% from 'service/modal-wrapper.njk' import modal %} {% call
modal("modal-role-edit", "Edit Role") %}
<div class="m__modal__body">
  <div class="m__modal__notice" id="role-edit-notice" hidden>
    <p>This role is from the library. To edit it for this configuration only, create a duplicate.</p>
    <button type="button" class="m__button-outline-compact" id="role-edit-duplicate-btn">Duplicate</button>
  </div>

  <div class="m__textfield">
    <label for="role-edit-name">Name</label>
    <input type="text" id="role-edit-name" placeholder="" value="Customer" />
  </div>
  <p class="m__modal__field-hint">
    Enter a clear, descriptive name for this role
  </p>

  <div class="m__space XS"></div>

  <div class="m__textfield">
    <label for="role-edit-description">Description</label>
    <textarea id="role-edit-description" class="m__textarea--autogrow" placeholder=""></textarea>
  </div>
  <p class="m__modal__field-hint">
    Enter a detailed description of this role
  </p>
</div>
<div class="m__modal__footer">
  <button
    type="button"
    class="m__button-outline-compact"
    data-modal-close="modal-role-edit"
  >
    Cancel
  </button>
  <button type="button" class="m__button-compact" id="role-edit-save-btn">Save</button>
</div>
{% endcall %}
