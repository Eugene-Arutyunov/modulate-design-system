{% from 'service/modal-wrapper.njk' import modal %} {% call
modal("modal-role-edit", "Edit Role") %}
<div class="m__modal__body">
  <div class="m__textfield M">
    <label for="role-edit-name">Name</label>
    <input type="text" id="role-edit-name" placeholder="" value="Customer" />
  </div>

  <div class="m__space XS"></div>

  <div class="m__textfield M">
    <label for="role-edit-short-description">Short description <span class="m__label-optional">(Optional)</span></label>
    <textarea id="role-edit-short-description" class="m__textarea--autogrow" placeholder=""></textarea>
  </div>

  <div class="m__space XS"></div>

  <div class="bw-prompt-header">
    <label for="role-edit-prompt">Prompt</label>
    <span class="bw-prompt-sep" aria-hidden="true">·</span>
    <a href="#" class="bw-prompt-link">How to write prompt</a>
  </div>
  <div class="m__textfield M">
    <textarea id="role-edit-prompt" class="m__textarea--autogrow" placeholder=""></textarea>
  </div>
  <p class="m__modal__field-hint">Enter a detailed description of this role.</p>

</div>
<div class="m__modal__footer">
  <button
    type="button"
    class="m__button-outline-compact"
    data-modal-close="modal-role-edit"
  >
    Cancel
  </button>
  <button type="button" class="m__button-compact" id="role-edit-save-btn">Save</button>
</div>
{% endcall %}
