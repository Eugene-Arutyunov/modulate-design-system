<div
  class="m__modal-backdrop"
  id="modal-deactivate-api-key"
  hidden
  aria-modal="true"
  role="dialog"
  aria-labelledby="modal-deactivate-api-key-title"
>
  <div class="m__modal">
    <div class="m__modal__header">
      <h2 class="m__modal__title" id="modal-deactivate-api-key-title">
        Deactivate API Key
      </h2>
      <button
        type="button"
        class="m__modal__close"
        aria-label="Close"
        data-modal-close="modal-deactivate-api-key"
      >
        <svg
          width="20"
          height="20"
          viewBox="0 0 16 16"
          fill="none"
          stroke="currentColor"
          stroke-width="1"
          aria-hidden="true"
        >
          <path d="M3 3l10 10M13 3L3 13" />
        </svg>
      </button>
    </div>
    <div class="m__modal__body">
      <p style="margin: 0">
        Are you sure you want to deactivate the API key “<span
          data-deactivate-key-name
        ></span
        >”?
      </p>
    </div>
    <div class="m__modal__footer">
      <button
        type="button"
        class="m__button-secondary-compact"
        data-modal-close="modal-deactivate-api-key"
      >
        Cancel
      </button>
      <button type="button" class="m__button-danger-compact">Deactivate</button>
    </div>
  </div>
</div>
