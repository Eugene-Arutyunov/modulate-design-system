{% from 'service/modal-wrapper.njk' import modal %}
{% call modal("modal-invite-member", "Invite Member") %}
<div class="m__modal__body">
  <div class="m__textfield M">
    <label for="invite-email">Email</label>
    <input type="email" id="invite-email" name="email" autocomplete="off" />
  </div>

  <div class="m__space XS"></div>

  <div class="m__select M">
    <label for="invite-role">Role</label>
    <div class="m__select__control">
      <select id="invite-role" name="role">
        <option value="developer">Developer</option>
        <option value="read-only">Read-Only</option>
        <option value="admin">Admin</option>
      </select>
      <svg
        width="12"
        height="12"
        viewBox="0 0 12 12"
        fill="none"
        stroke="currentColor"
        stroke-width="1"
        aria-hidden="true"
      >
        <path d="M2 4.5l4 4 4-4" />
      </svg>
    </div>
  </div>
</div>
<div class="m__modal__footer">
  <button
    type="button"
    class="m__button-secondary-outline S"
    data-modal-close="modal-invite-member"
  >
    Cancel
  </button>
  <button type="button" class="m__button-primary S">Send Invite</button>
</div>
{% endcall %}
