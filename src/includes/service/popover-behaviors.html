<!-- Popover (outside widget to escape overflow:clip) -->
<div class="m__popover" id="bw-popover" hidden>
  <div class="m__searchbar">
    <svg viewBox="0 0 32 32" aria-hidden="true" width="14" height="14">
      <use href="#search"></use>
    </svg>
    <input
      type="text"
      id="bw-popover-search"
      placeholder="Search…"
      autocomplete="off"
    />
  </div>
  <div class="m__popover-list" id="bw-popover-list"></div>
  <div class="m__popover-footer">
    <button type="button" class="m__popover-new-btn" id="bw-popover-new">
      Create new
    </button>
  </div>
</div>
