<div class="m__widget">
  <h2>Billing History</h2>
  <div class="m__table-wrapper">
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Type</th>
        <th>Credits</th>
        <th>Description</th>
      </tr>
    </thead>
    <tbody>
      {% if rows | length %}
        {% for row in rows %}
        <tr>
          <td>{{ row.date }}</td>
          <td><span class="m__tag-flat">{{ row.type }}</span></td>
          <td>{{ row.credits }}</td>
          <td>{{ row.description }}</td>
        </tr>
        {% endfor %}
      {% else %}
        <tr>
          <td colspan="4">
            <div class="m__table-empty">
              <p>No billing history yet. Credit additions from purchases, codes, and invites will appear here.</p>
            </div>
          </td>
        </tr>
      {% endif %}
    </tbody>
  </table>
  </div>
</div>
