{% from 'service/modal-wrapper.njk' import modal %} {% call
modal("modal-conversation-type-edit", "Edit Conversation Type") %}
<div class="m__modal__body">
  <div class="m__textfield M">
    <label for="conversation-type-edit-name">Name</label>
    <input type="text" id="conversation-type-edit-name" placeholder="" value="Customer Service Call" />
  </div>

  <div class="m__space XS"></div>

  <div class="m__textfield M">
    <label for="conversation-type-edit-short-description">Short description <span class="m__label-optional">(Optional)</span></label>
    <textarea id="conversation-type-edit-short-description" class="m__textarea--autogrow" placeholder=""></textarea>
  </div>

  <div class="m__space XS"></div>

  <div class="bw-prompt-header">
    <label for="conversation-type-edit-prompt">Prompt</label>
    <span class="bw-prompt-sep" aria-hidden="true">·</span>
    <a href="#" class="bw-prompt-link">How to write prompt</a>
  </div>
  <div class="m__textfield M">
    <textarea id="conversation-type-edit-prompt" class="m__textarea--autogrow" placeholder=""></textarea>
  </div>
  <p class="m__modal__field-hint">Enter a detailed description of this conversation type.</p>

</div>
<div class="m__modal__footer">
  <button
    type="button"
    class="m__button-secondary-outline S"
    data-modal-close="modal-conversation-type-edit"
  >
    Cancel
  </button>
  <button type="button" class="m__button-primary S" id="conversation-type-edit-save-btn">Save</button>
</div>
{% endcall %}
