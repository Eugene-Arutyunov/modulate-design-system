<div
  class="m__modal-backdrop"
  id="modal-billing-apply-code"
  hidden
  aria-modal="true"
  role="dialog"
  aria-labelledby="modal-billing-apply-code-title"
>
  <div class="m__modal">
    <div class="m__modal__header">
      <h2 class="m__modal__title" id="modal-billing-apply-code-title">
        Apply credit code
      </h2>
      <button
        type="button"
        class="m__modal__close"
        aria-label="Close"
        data-modal-close="modal-billing-apply-code"
      >
        <svg width="20" height="20" viewBox="0 0 16 16" aria-hidden="true">
          <use href="#close"></use>
        </svg>
      </button>
    </div>
    <div class="m__modal__body">
      <p>
        Apply credit code <strong data-apply-code-name></strong> to your
        account?
      </p>
    </div>
    <div class="m__modal__footer">
      <button
        type="button"
        class="m__button-secondary-compact"
        data-modal-close="modal-billing-apply-code"
      >
        Cancel
      </button>
      <button type="button" class="m__button-compact">Confirm</button>
    </div>
  </div>
</div>
