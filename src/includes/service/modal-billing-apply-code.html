{% from 'service/modal-wrapper.njk' import modal %}
{% call modal("modal-billing-apply-code", "Apply credit code") %}
<div class="m__modal__body">
  <p>
    Apply credit code <strong data-apply-code-name></strong> to your account?
  </p>
</div>
<div class="m__modal__footer">
  <button
    type="button"
    class="m__button-secondary-compact"
    data-modal-close="modal-billing-apply-code"
  >
    Cancel
  </button>
  <button type="button" class="m__button-compact">Confirm</button>
</div>
{% endcall %}
