{% from 'service/modal-wrapper.njk' import modal %}
{% call modal("modal-api-key-activate", "Reactivate API Key") %}
<div class="m__modal__body">
  <p>
    Are you sure you want to reactivate the API key
    <strong data-activate-key-name></strong>?
  </p>
</div>
<div class="m__modal__footer">
  <button
    type="button"
    class="m__button-outline-compact"
    data-modal-close="modal-api-key-activate"
  >
    Cancel
  </button>
  <button type="button" class="m__button-success-compact">Activate</button>
</div>
{% endcall %}
