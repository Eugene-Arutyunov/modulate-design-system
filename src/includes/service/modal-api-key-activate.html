<div
  class="m__modal-backdrop"
  id="modal-api-key-activate"
  hidden
  aria-modal="true"
  role="dialog"
  aria-labelledby="modal-api-key-activate-title"
>
  <div class="m__modal">
    <div class="m__modal__header">
      <h2 class="m__modal__title" id="modal-api-key-activate-title">
        Reactivate API Key
      </h2>
      <button
        type="button"
        class="m__modal__close"
        aria-label="Close"
        data-modal-close="modal-api-key-activate"
      >
        <svg
          width="20"
          height="20"
          viewBox="0 0 16 16"
          fill="none"
          stroke="currentColor"
          stroke-width="1"
          aria-hidden="true"
        >
          <path d="M3 3l10 10M13 3L3 13" />
        </svg>
      </button>
    </div>
    <div class="m__modal__body">
      <p>
        Are you sure you want to reactivate the API key
        <strong data-activate-key-name></strong>?
      </p>
    </div>
    <div class="m__modal__footer">
      <button
        type="button"
        class="m__button-secondary-compact"
        data-modal-close="modal-api-key-activate"
      >
        Cancel
      </button>
      <button type="button" class="m__button-success-compact">Activate</button>
    </div>
  </div>
</div>
