{% from 'service/modal-wrapper.njk' import modal %}
{% call modal("modal-leave-organization", "Leave Organization") %}
<div class="m__modal__body">
  <p>
    Leave <strong>Eugene's Personal Organization</strong>? You will lose
    access to all organization resources.
  </p>
</div>
<div class="m__modal__footer">
  <button
    type="button"
    class="m__button-outline-compact"
    data-modal-close="modal-leave-organization"
  >
    Cancel
  </button>
  <button type="button" class="m__button-danger-compact">Confirm</button>
</div>
{% endcall %}
