{% from 'service/modal-wrapper.njk' import modal %}
{% call modal("modal-cancel-invite", "Cancel Invite") %}
<div class="m__modal__body">
  <p>
    Cancel the pending invite for <strong data-cancel-invite-email></strong>?
  </p>
</div>
<div class="m__modal__footer">
  <button
    type="button"
    class="m__button-secondary-compact"
    data-modal-close="modal-cancel-invite"
  >
    Keep Invite
  </button>
  <button type="button" class="m__button-danger-compact">Cancel Invite</button>
</div>
{% endcall %}
