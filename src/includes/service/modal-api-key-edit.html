<div
  class="m__modal-backdrop"
  id="modal-api-key-edit"
  hidden
  aria-modal="true"
  role="dialog"
  aria-labelledby="modal-api-key-edit-title"
>
  <div class="m__modal">
    <div class="m__modal__header">
      <h2 class="m__modal__title" id="moda-api-key-edit-title">Edit API Key</h2>
      <button
        type="button"
        class="m__modal__close"
        aria-label="Close"
        data-modal-close="modal-api-key-edit"
      >
        <svg width="20" height="20" viewBox="0 0 16 16" aria-hidden="true">
          <use href="#close"></use>
        </svg>
      </button>
    </div>
    <div class="m__modal__body">
      <div class="m__textfield">
        <label for="edit-key-name">Name</label>
        <input type="text" id="edit-key-name" name="name" autocomplete="off" />
      </div>

      <div class="m__space XS"></div>

      <div class="m__textfield">
        <label for="edit-key-description">Description</label>
        <textarea id="edit-key-description" name="description"></textarea>
      </div>
    </div>
    <div class="m__modal__footer">
      <button
        type="button"
        class="m__button-secondary-compact"
        data-modal-close="modal-api-key-edit"
      >
        Cancel
      </button>
      <button type="button" class="m__button-compact">Save</button>
    </div>
  </div>
</div>
