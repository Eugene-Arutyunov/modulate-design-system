<div class="m__modal-backdrop" id="modal-edit-api-key" hidden aria-modal="true" role="dialog" aria-labelledby="modal-edit-api-key-title">
  <div class="m__modal">
    <div class="m__modal__header">
      <h2 class="m__modal__title" id="modal-edit-api-key-title">Edit API Key</h2>
      <button type="button" class="m__modal__close" aria-label="Close" data-modal-close="modal-edit-api-key">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path d="M3 3l10 10M13 3L3 13"/>
        </svg>
      </button>
    </div>
    <div class="m__modal__body">
      <div class="m__textfield">
        <label for="edit-key-name">Name</label>
        <input type="text" id="edit-key-name" name="name" autocomplete="off" />
      </div>

      <div class="m__space XS"></div>

      <div class="m__textfield">
        <label for="edit-key-description">Description</label>
        <textarea id="edit-key-description" name="description"></textarea>
      </div>
    </div>
    <div class="m__modal__footer">
      <button type="button" class="m__button-secondary" data-modal-close="modal-edit-api-key">Cancel</button>
      <button type="button" class="m__button">Save</button>
    </div>
  </div>
</div>
