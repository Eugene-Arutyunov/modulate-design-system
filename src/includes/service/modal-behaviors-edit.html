{% from 'service/modal-wrapper.njk' import modal %} {% call
modal("modal-behaviors-edit", "Edit Behavior") %}
<div class="m__modal__body">
  <div class="m__textfield">
    <label for="behavior-edit-name">Name</label>
    <input type="text" id="behavior-edit-name" placeholder="" value="Mysoginy" />
  </div>
  <p class="m__modal__field-hint">
    Enter a clear, descriptive name for this behavior
  </p>

  <div class="m__space XS"></div>

  <div class="m__textfield">
    <label for="behavior-edit-description">Description</label>
    <textarea id="behavior-edit-description" placeholder=""></textarea>
  </div>
  <p class="m__modal__field-hint">
    Enter a detailed description of this behavior and what indicators to look
    for
  </p>

</div>
<div class="m__modal__footer">
  <button
    type="button"
    class="m__button-outline-compact"
    data-modal-close="modal-behaviors-edit"
  >
    Cancel
  </button>
  <button type="button" class="m__button-compact">Save</button>
</div>
{% endcall %}
