<div
  class="m__modal-backdrop"
  id="modal-api-key-delete"
  hidden
  aria-modal="true"
  role="dialog"
  aria-labelledby="modal-api-key-delete-title"
>
  <div class="m__modal">
    <div class="m__modal__header">
      <h2 class="m__modal__title" id="modal-api-key-delete-title">
        Delete API Key
      </h2>
      <button
        type="button"
        class="m__modal__close"
        aria-label="Close"
        data-modal-close="modal-api-key-delete"
      >
        <svg width="20" height="20" viewBox="0 0 16 16" aria-hidden="true">
          <use href="#close"></use>
        </svg>
      </button>
    </div>
    <div class="m__modal__body">
      <p>
        Are you sure you want to delete the API key
        <strong data-delete-key-name></strong>? This action cannot be undone.
      </p>
    </div>
    <div class="m__modal__footer">
      <button
        type="button"
        class="m__button-secondary-compact"
        data-modal-close="modal-api-key-delete"
      >
        Cancel
      </button>
      <button type="button" class="m__button-danger-compact">Delete</button>
    </div>
  </div>
</div>
