<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{{ pageTitle if pageTitle else 'Modulate Design' }}</title>
    <meta
      name="description"
      content="{{ pageDesc if pageDesc else 'Modulate UI library' }}" />
    <meta property="og:image" content="/assets/IMG_7135.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="shortcut icon" href="/assets/service/favicon.png" />

    <link rel="stylesheet" href="/bundle.css" />
  </head>
  <body data-theme-storage-key="design-system-theme">
    {% include 'service/svg-icons-sprite.html' %}
    <script>
      (function () {
        var key = document.body.dataset.themeStorageKey;
        var theme = localStorage.getItem(key);
        if (theme !== "light") {
          document.body.classList.add("dark-mode");
        }
      })();
    </script>
    {% set islandThemeToggle = true %} {% include 'service/nav-island.html' %}
    {% include 'service/header.html' %} {% block content %}{% endblock %} {%
    include 'service/footer.html' %}

    <script src="/assets/service/theme-toggle.js"></script>
    <script src="/assets/service/nav-island.js"></script>
    <script type="module" src="/assets/service/main.js"></script>
    <script src="/assets/service/color-palette.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="/assets/service/ds-charts.js"></script>
    <script src="/assets/components/textfield.js"></script>
  </body>
</html>
