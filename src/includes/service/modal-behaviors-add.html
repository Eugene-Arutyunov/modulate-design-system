<div
  class="m__modal-backdrop"
  id="modal-behaviors-add"
  hidden
  aria-modal="true"
  role="dialog"
  aria-labelledby="modal-behaviors-add-title"
>
  <div class="m__modal m__modal--wide">
    <div class="m__modal__header">
      <h2 class="m__modal__title" id="modal-behaviors-add-title">
        Add existing Behaviors
      </h2>
      <button
        type="button"
        class="m__modal__close"
        aria-label="Close"
        data-modal-close="modal-behaviors-add"
      >
        <svg width="20" height="20" viewBox="0 0 16 16" aria-hidden="true">
          <use href="#close"></use>
        </svg>
      </button>
    </div>
    <div class="m__modal__body bw-add-modal-body">
      <div class="m__searchbar">
        <svg viewBox="0 0 32 32" aria-hidden="true" width="14" height="14">
          <use href="#search"></use>
        </svg>
        <input
          type="text"
          id="bw-add-search"
          placeholder="Search…"
          autocomplete="off"
        />
      </div>
      <div class="bw-add-list" id="bw-add-list"></div>
      <p class="bw-add-empty" id="bw-add-empty" hidden>No matching behaviors</p>
    </div>
    <div class="m__modal__footer">
      <button
        type="button"
        class="m__button-outline-compact"
        data-modal-close="modal-behaviors-add"
      >
        Cancel
      </button>
      <button
        type="button"
        class="m__button-compact"
        id="bw-add-confirm-btn"
      >
        Add
      </button>
    </div>
  </div>
</div>
