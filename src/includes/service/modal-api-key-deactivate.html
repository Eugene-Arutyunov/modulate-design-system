{% from 'service/modal-wrapper.njk' import modal %}
{% call modal("modal-api-key-deactivate", "Deactivate API Key") %}
<div class="m__modal__body">
  <p>
    Are you sure you want to deactivate the API key
    <strong data-deactivate-key-name></strong>?
  </p>
</div>
<div class="m__modal__footer">
  <button
    type="button"
    class="m__button-secondary-compact"
    data-modal-close="modal-api-key-deactivate"
  >
    Cancel
  </button>
  <button type="button" class="m__button-danger-compact">Deactivate</button>
</div>
{% endcall %}
