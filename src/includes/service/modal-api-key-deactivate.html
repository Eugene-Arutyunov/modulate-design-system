<div
  class="m__modal-backdrop"
  id="modal-api-key-deactivate"
  hidden
  aria-modal="true"
  role="dialog"
  aria-labelledby="modal-api-key-deactivate-title"
>
  <div class="m__modal">
    <div class="m__modal__header">
      <h2 class="m__modal__title" id="modal-api-key-deactivate-title">
        Deactivate API Key
      </h2>
      <button
        type="button"
        class="m__modal__close"
        aria-label="Close"
        data-modal-close="modal-api-key-deactivate"
      >
        <svg width="20" height="20" viewBox="0 0 16 16" aria-hidden="true">
          <use href="#close"></use>
        </svg>
      </button>
    </div>
    <div class="m__modal__body">
      <p>
        Are you sure you want to deactivate the API key
        <strong data-deactivate-key-name></strong>?
      </p>
    </div>
    <div class="m__modal__footer">
      <button
        type="button"
        class="m__button-secondary-compact"
        data-modal-close="modal-api-key-deactivate"
      >
        Cancel
      </button>
      <button type="button" class="m__button-danger-compact">Deactivate</button>
    </div>
  </div>
</div>
