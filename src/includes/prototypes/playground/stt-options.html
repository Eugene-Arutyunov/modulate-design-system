      <!-- Options row -->
      <div class="pg-options-row">
        <div class="pg-stt-options visible" id="stt-options">
          <label
            class="m__toggle pg-stt-option"
            data-tooltip="Fast transcription, English only"
          >
            <input type="checkbox" id="opt-fast" />
            Fast (English only)
          </label>
          <label
            class="m__checkbox pg-stt-option"
            data-tooltip="Identify different speakers in the audio"
          >
            <input type="checkbox" id="opt-diarization" checked /><svg aria-hidden="true"><use href="#checkmark"></use></svg> Diarization
          </label>
          <label
            class="m__checkbox pg-stt-option"
            data-tooltip="Detect synthetic/AI-generated voice (deepfake) per utterance"
          >
            <input type="checkbox" id="opt-deepfake" checked /><svg aria-hidden="true"><use href="#checkmark"></use></svg> Deepfake
          </label>
          <label
            class="m__checkbox pg-stt-option"
            data-tooltip="Detect emotional tone (e.g. Calm, Happy, Frustrated)"
          >
            <input type="checkbox" id="opt-emotion" checked /><svg aria-hidden="true"><use href="#checkmark"></use></svg> Emotions
          </label>
          <label
            class="m__checkbox pg-stt-option"
            data-tooltip="Detect speaker accent (e.g. American, British)"
          >
            <input type="checkbox" id="opt-accent" checked /><svg aria-hidden="true"><use href="#checkmark"></use></svg> Accent
          </label>
          <label
            class="m__checkbox pg-stt-option"
            data-tooltip="Tag personally identifiable and health information"
          >
            <input type="checkbox" id="opt-pii" checked /><svg aria-hidden="true"><use href="#checkmark"></use></svg> PII/PHI
          </label>
        </div>
      </div>
