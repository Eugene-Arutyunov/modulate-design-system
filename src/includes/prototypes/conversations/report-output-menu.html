{% if not reportOutputMenuVariant %}
{% set reportOutputMenuVariant = 'button' %}
{% endif %}
{% set isTextReportOutputMenu = reportOutputMenuVariant == 'text' %}

<div
  class="m__menu-button conversation-report__report-menu{% if isTextReportOutputMenu %} conversation-report__report-menu--text{% endif %}"
>
  <button
    type="button"
    class="{% if isTextReportOutputMenu %}m__menu-button-trigger conversation-report__report-trigger conversation-report__report-trigger--text{% else %}m__menu-button-secondary M m__menu-button-trigger conversation-report__report-trigger{% endif %}"
    aria-haspopup="menu"
    aria-expanded="false"
  >
    {% if isTextReportOutputMenu %}
    <span class="conversation-report__report-trigger-text">Velma</span>
    {% else %}
    <svg
      class="conversation-report__report-icon"
      viewBox="0 0 32 32"
      aria-hidden="true"
    >
      <use href="#velma"></use>
    </svg>
    <span class="conversation-report__report-trigger-text">Velma</span>
    {% endif %}
    <svg class="m__button__icon" viewBox="0 0 12 12" aria-hidden="true">
      <use href="#chevron-down"></use>
    </svg>
  </button>
  <div
    class="m__menu-button-list conversation-report__report-list{% if isTextReportOutputMenu %} conversation-report__report-list--start{% endif %}"
    hidden
    role="menu"
    {% if isTextReportOutputMenu %}data-menu-button-select="trigger-text"{% endif %}
  >
    {% if isTextReportOutputMenu %}
    <div class="conversation-report__report-items" role="presentation">
      <button
        type="button"
        class="m__menu-button-item conversation-report__report-item is-active"
        role="menuitem"
        aria-current="true"
      >
        <span class="conversation-report__report-item-icon" aria-hidden="true">
          <svg viewBox="0 0 32 32">
            <use href="#velma"></use>
          </svg>
        </span>
        <span class="conversation-report__report-item-copy">
          <span class="conversation-report__report-item-title">Velma</span>
        </span>
      </button>
      <button
        type="button"
        class="m__menu-button-item conversation-report__report-item"
        role="menuitem"
      >
        <span class="conversation-report__report-item-icon" aria-hidden="true">
          <svg viewBox="0 0 32 32">
            <use href="#redaction"></use>
          </svg>
        </span>
        <span class="conversation-report__report-item-copy">
          <span class="conversation-report__report-item-title">PII/PHI</span>
        </span>
      </button>
      <button
        type="button"
        class="m__menu-button-item conversation-report__report-item"
        role="menuitem"
      >
        <span class="conversation-report__report-item-icon" aria-hidden="true">
          <svg viewBox="0 0 32 32">
            <use href="#deepfake"></use>
          </svg>
        </span>
        <span class="conversation-report__report-item-copy">
          <span class="conversation-report__report-item-title">Deepfake</span>
        </span>
      </button>
      <button
        type="button"
        class="m__menu-button-item conversation-report__report-item"
        role="menuitem"
      >
        <span class="conversation-report__report-item-icon" aria-hidden="true">
          <svg viewBox="0 0 32 32">
            <use href="#language"></use>
          </svg>
        </span>
        <span class="conversation-report__report-item-copy">
          <span class="conversation-report__report-item-title">Language</span>
        </span>
      </button>
      <button
        type="button"
        class="m__menu-button-item conversation-report__report-item"
        role="menuitem"
      >
        <span class="conversation-report__report-item-icon" aria-hidden="true">
          <svg viewBox="0 0 32 32">
            <use href="#transcript"></use>
          </svg>
        </span>
        <span class="conversation-report__report-item-copy">
          <span class="conversation-report__report-item-title">Multilingual</span>
        </span>
      </button>
      <button
        type="button"
        class="m__menu-button-item conversation-report__report-item"
        role="menuitem"
      >
        <span class="conversation-report__report-item-icon" aria-hidden="true">
          <svg viewBox="0 0 32 32">
            <use href="#music"></use>
          </svg>
        </span>
        <span class="conversation-report__report-item-copy">
          <span class="conversation-report__report-item-title">Music &amp; Speech</span>
        </span>
      </button>
      <button
        type="button"
        class="m__menu-button-item conversation-report__report-item"
        role="menuitem"
      >
        <span class="conversation-report__report-item-icon" aria-hidden="true">
          <svg viewBox="0 0 32 32">
            <use href="#ai-music"></use>
          </svg>
        </span>
        <span class="conversation-report__report-item-copy">
          <span class="conversation-report__report-item-title">AI Music</span>
        </span>
      </button>
      <div class="conversation-report__report-settings-footer" role="presentation">
        <a
          href="/dashboard/model-settings/"
          class="m__menu-button-item m__menu-button-primary S conversation-report__report-item conversation-report__report-item--settings"
          role="menuitem"
          data-menu-button-action="model-settings"
        >
          <span class="conversation-report__report-item-title">Model settings</span>
        </a>
      </div>
    </div>
    {% else %}
    <div class="conversation-report__report-items" role="presentation">
      <a
        href="/dashboard/conversations/7839f2/"
        class="m__menu-button-item conversation-report__report-item is-active"
        role="menuitem"
        aria-current="page"
      >
        <span class="conversation-report__report-item-icon" aria-hidden="true">
          <svg viewBox="0 0 32 32">
            <use href="#velma"></use>
          </svg>
        </span>
        <span class="conversation-report__report-item-title">Velma</span>
      </a>
      <a
        href="#"
        class="m__menu-button-item conversation-report__report-item"
        role="menuitem"
      >
        <span class="conversation-report__report-item-icon" aria-hidden="true">
          <svg viewBox="0 0 32 32">
            <use href="#redaction"></use>
          </svg>
        </span>
        <span class="conversation-report__report-item-title">PII/PHI</span>
      </a>
      <a
        href="#"
        class="m__menu-button-item conversation-report__report-item"
        role="menuitem"
      >
        <span class="conversation-report__report-item-icon" aria-hidden="true">
          <svg viewBox="0 0 32 32">
            <use href="#deepfake"></use>
          </svg>
        </span>
        <span class="conversation-report__report-item-title">Deepfake</span>
      </a>
      <a
        href="#"
        class="m__menu-button-item conversation-report__report-item"
        role="menuitem"
      >
        <span class="conversation-report__report-item-icon" aria-hidden="true">
          <svg viewBox="0 0 32 32">
            <use href="#language"></use>
          </svg>
        </span>
        <span class="conversation-report__report-item-title">Language</span>
      </a>
    </div>

    <div class="conversation-report__report-generate" role="presentation">
      <span class="conversation-report__report-generate-title"
        >GENERATE</span
      >
      <div class="conversation-report__report-items" role="presentation">
        <button
          type="button"
          class="m__menu-button-item conversation-report__report-item conversation-report__report-item--generate"
          role="menuitem"
        >
          <span
            class="conversation-report__report-item-icon"
            aria-hidden="true"
          >
            <svg viewBox="0 0 32 32">
              <use href="#transcript"></use>
            </svg>
          </span>
          <span class="conversation-report__report-item-copy">
            <span class="conversation-report__report-item-title"
              >Multilingual</span
            >
            <span class="conversation-report__report-item-cost"
              >0.039 cr.</span
            >
          </span>
        </button>
        <button
          type="button"
          class="m__menu-button-item conversation-report__report-item conversation-report__report-item--generate"
          role="menuitem"
        >
          <span
            class="conversation-report__report-item-icon"
            aria-hidden="true"
          >
            <svg viewBox="0 0 32 32">
              <use href="#music"></use>
            </svg>
          </span>
          <span class="conversation-report__report-item-copy">
            <span class="conversation-report__report-item-title"
              >Music &amp; Speech</span
            >
            <span class="conversation-report__report-item-cost"
              >0.071 cr.</span
            >
          </span>
        </button>
        <button
          type="button"
          class="m__menu-button-item conversation-report__report-item conversation-report__report-item--generate"
          role="menuitem"
        >
          <span
            class="conversation-report__report-item-icon"
            aria-hidden="true"
          >
            <svg viewBox="0 0 32 32">
              <use href="#ai-music"></use>
            </svg>
          </span>
          <span class="conversation-report__report-item-copy">
            <span class="conversation-report__report-item-title">AI Music</span>
            <span class="conversation-report__report-item-cost"
              >0.054 cr.</span
            >
          </span>
        </button>
      </div>
    </div>
    {% endif %}
  </div>
</div>
