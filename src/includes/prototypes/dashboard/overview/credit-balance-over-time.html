<div class="m__widget" data-component="credit-balance-over-time">
  <h2>Credit Balance Over Time</h2>
  <fieldset class="m__segmented-control-compact" data-chart="credit-balance">
    <label
      ><input type="radio" name="credit-period" value="7d" />Last 7 days</label
    >
    <label
      ><input type="radio" name="credit-period" value="30d" checked />30
      days</label
    >
  </fieldset>
  <div class="chart-container">
    <canvas id="credit-balance-chart"></canvas>
    <p class="chart-empty" hidden>No credit history data for this period.</p>
  </div>
  <p class="chart-status-bar"></p>
</div>
