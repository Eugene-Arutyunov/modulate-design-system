<section
  class="dashboard-section m__widget"
  data-component="requests-by-status">
  <h2>Requests by status</h2>
  <fieldset class="m__segmented-control-compact" data-chart="request-status">
    <label
      ><input type="radio" name="status-period" value="7d" />Last 7 days</label
    >
    <label
      ><input type="radio" name="status-period" value="30d" checked />30
      days</label
    >
  </fieldset>
  <div class="chart-container">
    <canvas id="request-status-chart"></canvas>
    <p class="chart-empty" hidden>No requests recorded for this period.</p>
  </div>
</section>
