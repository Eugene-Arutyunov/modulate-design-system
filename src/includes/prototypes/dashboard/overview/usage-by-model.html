<section class="dashboard-section m__widget" data-component="usage-by-model">
  <h2>Usage by model</h2>
  <fieldset class="m__segmented-control-compact" data-chart="usage-by-model">
    <label
      ><input type="radio" name="usage-period" value="7d" />Last 7 days</label
    >
    <label
      ><input type="radio" name="usage-period" value="30d" checked />30
      days</label
    >
  </fieldset>
  <div class="chart-container">
    <canvas id="usage-by-model-chart"></canvas>
    <p class="chart-empty" hidden>No usage data for this period.</p>
  </div>
</section>
