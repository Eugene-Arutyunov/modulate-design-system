<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{{ pageTitle if pageTitle else 'Modulate' }}</title>
    <meta
      name="description"
      content="{{ pageDesc if pageDesc else 'Modulate Developer APIs' }}" />
    <link rel="shortcut icon" href="/assets/service/favicon-product.png" />

    <link rel="stylesheet" href="/bundle.css" />
    {% block head %}{% endblock %}
  </head>
  <body>
    <script>
      (function () {
        try {
          if (localStorage.getItem("prototype-internal-nav-hidden") === "1") {
            document.body.classList.add("prototype-hide-internal-nav");
          }
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
    {% include 'service/svg-icons-sprite.html' %} {% include
    'service/nav-island.html' %} {% set isLanding = true %} {% include
    'prototypes/header.html' %} {% block content %}{% endblock %} {% include
    'prototypes/footer.html' %}
    <script src="/assets/service/nav-island.js"></script>
    <script src="/assets/prototypes/header-menu.js"></script>
    <script src="/assets/prototypes/prototype-internal-nav-toggle.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
