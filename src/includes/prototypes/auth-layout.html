<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{{ pageTitle if pageTitle else 'Sign in' }}</title>
    <meta
      name="description"
      content="{{ pageDesc if pageDesc else 'Modulate UI library' }}" />
    <link rel="shortcut icon" href="/assets/service/favicon-product.png" />

    <link rel="stylesheet" href="/bundle.css" />
  </head>
  <body>
    {% include 'service/svg-icons-sprite.html' %}

    <div class="auth-layout">
      <div class="auth-layout__left">
        <header class="auth-layout__header prototype-header">
          <div class="prototype-header__brand">
            <svg
              class="prototype-header__icon"
              viewBox="0 0 32 32"
              aria-hidden="true">
              <use href="#modulate"></use>
            </svg>
            <span class="prototype-header__brand-label">Modulate</span>
          </div>
        </header>

        <main class="auth-layout__main">{% block content %}{% endblock %}</main>

        <footer class="auth-layout__footer">
          <p class="caption">
            By proceeding, you agree to our <a href="#">Terms of Use</a> and
            <a href="#">Privacy Policy</a>
          </p>
        </footer>
      </div>

      {% include 'prototypes/auth-layout-models-panel.html' %}
    </div>
    <script src="/assets/components/textfield.js"></script>
  </body>
</html>
