<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{{ pageTitle if pageTitle else 'Modulate' }}</title>
    <meta
      name="description"
      content="{{ pageDesc if pageDesc else 'Modulate Developer APIs' }}" />
    <link rel="shortcut icon" href="/assets/favicon-product.png" />

    <link rel="stylesheet" href="/bundle.css" />
  </head>
  <body class="ids">
    <script>
      (function () {
        try {
          if (localStorage.getItem("prototype-internal-nav-hidden") === "1") {
            document.body.classList.add("prototype-hide-internal-nav");
          }
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
    {% include 'assets/svg-icons-sprite.html' %} {% set isLanding = true %} {%
    include 'header.html' %} {% block content %}{% endblock %} {% include
    'footer.html' %}
    <script src="/assets/js/header-menu.js"></script>
    <script src="/assets/js/prototype-internal-nav-toggle.js"></script>
  </body>
</html>
