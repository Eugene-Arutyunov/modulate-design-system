---
pageTitle: Sign in
permalink: /auth/login/
---

{% extends 'auth-layout.html' %} {% block content %}

<form class="auth-form" action="#" method="post" novalidate>
  <h1>Sign in</h1>
  <div class="m__space XS"></div>

  <div class="m__textfield">
    <label for="login-email">Email</label>
    <input type="email" id="login-email" name="email" autocomplete="email" aria-describedby="auth-tf-email-invalid-error" />
    <div class="m__textfield__message" id="auth-tf-email-invalid-error">
      <span>Enter a valid email address</span>
    </div>
  </div>

  <div class="m__textfield">
    <div class="auth-form__textfield-header">
      <label for="login-password">Password</label>
      <a href="/auth/reset-password/">Forgot password?</a>
    </div>
    <input
      type="password"
      id="login-password"
      name="password"
      autocomplete="current-password" />
  </div>

  <div class="auth-form__actions">
    <a href="/auth/org-select/" class="m__button">Sign in</a>
  </div>

  <div class="m__space XS"></div>

  <a href="/auth/signup/" class="auth-form__link">Create account</a>

  <div class="m__space M"></div>

  <div class="auth-form__oauth">
    <a href="/dashboard/overview/" class="m__button-secondary">
      <svg class="m__button__icon" viewBox="0 0 32 32" aria-hidden="true">
        <use href="#google"></use>
      </svg>
      Continue with Google
    </a>
    <a href="/dashboard/overview/" class="m__button-secondary">
      <svg class="m__button__icon" viewBox="0 0 32 32" aria-hidden="true">
        <use href="#microsoft"></use>
      </svg>
      Continue with Microsoft
    </a>
    <a href="/dashboard/overview/" class="m__button-secondary">
      <svg class="m__button__icon" viewBox="0 0 32 32" aria-hidden="true">
        <use href="#facebook"></use>
      </svg>
      Continue with Facebook
    </a>
  </div>
</form>

{% endblock %}
